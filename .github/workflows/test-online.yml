name: Online tests

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  test-online:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:online
